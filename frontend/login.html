<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ — PharmaCare AI</title>
    <meta name="description" content="เข้าสู่ระบบ PharmaCare AI ผู้ช่วยเภสัชกรอัจฉริยะ">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', 'Noto Sans Thai', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 25%, #a7f3d0 50%, #bfdbfe 75%, #ddd6fe 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            padding: 1rem;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            animation: fadeSlideUp 0.6s ease-out;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.08),
                0 8px 24px rgba(0, 0, 0, 0.04),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-icon {
            width: 72px;
            height: 72px;
            border-radius: 20px;
            background: linear-gradient(135deg, #10b981, #06b6d4);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 8px 32px rgba(16, 185, 129, 0.3);
            margin-bottom: 1rem;
        }

        .logo-title {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #10b981, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-subtitle {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 0.25rem;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 0.5rem;
            letter-spacing: 0.3px;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 14px;
            font-size: 0.95rem;
            font-family: inherit;
            color: #1e293b;
            background: rgba(255, 255, 255, 0.7);
            transition: all 0.2s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15), 0 0 20px rgba(16, 185, 129, 0.08);
            background: #fff;
        }

        .form-input::placeholder { color: #94a3b8; }

        .login-btn {
            width: 100%;
            padding: 0.9rem;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            color: #fff;
            background: linear-gradient(135deg, #10b981, #06b6d4);
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 16px rgba(16, 185, 129, 0.3);
            margin-top: 0.5rem;
            position: relative;
            overflow: hidden;
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-btn .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }

        .login-btn.loading .btn-text { display: none; }
        .login-btn.loading .spinner { display: inline-block; }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg {
            display: none;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            animation: fadeSlideUp 0.3s ease-out;
        }

        .error-msg.show { display: block; }

        .footer-text {
            text-align: center;
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 1.5rem;
        }

        /* Floating pills decoration */
        .pill {
            position: fixed;
            font-size: 2rem;
            opacity: 0.12;
            animation: floatPill 20s ease-in-out infinite;
            pointer-events: none;
            z-index: -1;
        }
        .pill:nth-child(1) { top: 10%; left: 8%; animation-delay: 0s; }
        .pill:nth-child(2) { top: 70%; left: 85%; animation-delay: -5s; font-size: 2.5rem; }
        .pill:nth-child(3) { top: 25%; left: 78%; animation-delay: -10s; }
        .pill:nth-child(4) { top: 80%; left: 15%; animation-delay: -15s; font-size: 1.5rem; }

        @keyframes floatPill {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-20px) rotate(5deg); }
            50% { transform: translateY(10px) rotate(-5deg); }
            75% { transform: translateY(-15px) rotate(3deg); }
        }
    </style>
</head>
<body>
    <!-- Decorative pills -->
    <div class="pill">💊</div>
    <div class="pill">🏥</div>
    <div class="pill">💉</div>
    <div class="pill">🩺</div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-area">
                <div class="logo-icon">💊</div>
                <div class="logo-title">PharmaCare AI</div>
                <div class="logo-subtitle">ผู้ช่วยเภสัชกรอัจฉริยะ</div>
            </div>

            <div id="errorMsg" class="error-msg"></div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="username">ชื่อผู้ใช้</label>
                    <input class="form-input" type="text" id="username" name="username" placeholder="ชื่อผู้ใช้" autocomplete="username" required autofocus>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">รหัสผ่าน</label>
                    <input class="form-input" type="password" id="password" name="password" placeholder="รหัสผ่าน" autocomplete="current-password" required>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span class="btn-text">เข้าสู่ระบบ</span>
                    <span class="spinner"></span>
                </button>
            </form>

            <p class="footer-text">PharmaCare AI v2.0 — ระบบถามตอบเภสัชกรรมอัจฉริยะ</p>
        </div>
    </div>

    <script>
        // Check if already logged in
        const token = localStorage.getItem('token');
        if (token) {
            fetch('/api/me', { headers: { 'Authorization': `Bearer ${token}` } })
                .then(r => { if (r.ok) window.location.href = '/'; })
                .catch(() => {});
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('errorMsg');
            
            btn.classList.add('loading');
            btn.disabled = true;
            errorDiv.classList.remove('show');

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });

                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.detail || 'เข้าสู่ระบบไม่สำเร็จ');
                }

                const data = await res.json();
                localStorage.setItem('token', data.token);
                localStorage.setItem('username', data.username);
                localStorage.setItem('display_name', data.display_name);

                window.location.href = '/';
            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.classList.add('show');
                
                // Shake animation
                const card = document.querySelector('.login-card');
                card.style.animation = 'none';
                card.offsetHeight; // trigger reflow
                card.style.animation = 'shake 0.4s ease';
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        // Shake keyframe (added dynamically)
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                20% { transform: translateX(-8px); }
                40% { transform: translateX(8px); }
                60% { transform: translateX(-4px); }
                80% { transform: translateX(4px); }
            }
        `;
        document.head.appendChild(style);

        // Enter key support
        document.getElementById('password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('loginForm').requestSubmit();
        });
    </script>
</body>
</html>
