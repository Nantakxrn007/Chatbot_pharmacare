<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaCare AI — Test Cases</title>
    <meta name="description" content="Test Case Dashboard สำหรับประเมินความแม่นยำของ Pharmacy Chatbot">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'Noto Sans Thai', 'sans-serif'] },
                    colors: {
                        brand: {
                            50:'#ecfdf5',100:'#d1fae5',200:'#a7f3d0',300:'#6ee7b7',
                            400:'#34d399',500:'#10b981',600:'#059669',700:'#047857',
                            800:'#065f46',900:'#064e3b',950:'#022c22',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', 'Noto Sans Thai', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
        .glass { background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03); }
        .gradient-text { background: linear-gradient(135deg, #34d399, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out; }

        @keyframes progressPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .progress-pulse { animation: progressPulse 1.5s ease-in-out infinite; }

        .row-hover:hover { background: rgba(0,0,0,0.03); }
        .expandable-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
        .expandable-content.open { max-height: 2000px; }

        /* Score color scale */
        .score-high { color: #10b981; }
        .score-mid { color: #f59e0b; }
        .score-low { color: #ef4444; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen selection:bg-emerald-200 selection:text-emerald-900">

    <!-- ═══ Header ═══ -->
    <header class="border-b border-slate-200 bg-white/80 shadow-sm backdrop-blur-xl sticky top-0 z-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="/" class="flex items-center gap-3 hover:opacity-80 transition">
                    <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-emerald-500 to-cyan-500 flex items-center justify-center text-lg shadow-lg shadow-emerald-500/20">💊</div>
                    <h1 class="font-bold text-lg gradient-text hidden sm:block">PharmaCare AI</h1>
                </a>
                <div class="h-6 w-px bg-slate-200 hidden sm:block"></div>
                <div>
                    <h2 class="text-sm font-semibold text-slate-800">Test Case Dashboard</h2>
                    <p class="text-[11px] text-slate-500">ประเมินความแม่นยำของระบบ</p>
                </div>
            </div>
            <a href="/" class="px-4 py-2 rounded-lg bg-white border border-slate-200 shadow-sm text-sm text-slate-600 hover:text-slate-900 hover:bg-slate-50 transition flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                กลับหน้า Chat
            </a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6">

        <!-- ═══ Stats Cards ═══ -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
            <div class="glass rounded-xl p-4">
                <p class="text-[11px] text-slate-500 uppercase tracking-wider mb-1">Total Cases</p>
                <p class="text-2xl font-bold text-slate-800" id="statTotal">—</p>
            </div>
            <div class="glass rounded-xl p-4">
                <p class="text-[11px] text-slate-500 uppercase tracking-wider mb-1">Pass (LLM ≥3)</p>
                <p class="text-2xl font-bold text-emerald-600" id="statPass">—</p>
            </div>
            <div class="glass rounded-xl p-4">
                <p class="text-[11px] text-slate-500 uppercase tracking-wider mb-1">Fail (LLM <3)</p>
                <p class="text-2xl font-bold text-red-500" id="statFail">—</p>
            </div>
            <div class="glass rounded-xl p-4">
                <p class="text-[11px] text-slate-500 uppercase tracking-wider mb-1">Avg Cosine</p>
                <p class="text-2xl font-bold text-cyan-600" id="statAvgCosine">—</p>
            </div>
        </div>

        <!-- ═══ Controls ═══ -->
        <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 mb-4">
            <div class="flex items-center gap-3 flex-wrap">
                <button onclick="runAllTests()" id="runBtn"
                    class="px-5 py-2.5 rounded-xl bg-gradient-to-r from-emerald-600 to-cyan-600 hover:from-emerald-500 hover:to-cyan-500 text-white font-medium text-sm flex items-center gap-2 transition-all shadow-lg shadow-emerald-600/20 active:scale-[0.98] disabled:opacity-40 disabled:cursor-not-allowed">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    <span id="runBtnText">รัน / ดำเนินการต่อ</span>
                </button>
                <button onclick="stopTests()" id="stopBtn"
                    class="px-4 py-2.5 rounded-xl glass text-sm text-red-500 hover:bg-red-50 transition hidden items-center gap-2 border border-red-100">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"/></svg>
                    หยุด
                </button>
                <button onclick="downloadCSV()" id="exportBtn"
                    class="px-4 py-2.5 rounded-xl glass text-sm text-slate-600 hover:bg-slate-100 transition flex items-center gap-2 border border-slate-200">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                    Export CSV
                </button>
                <button onclick="resetTests()" id="resetBtn"
                    class="px-4 py-2.5 rounded-xl glass text-sm text-slate-600 hover:bg-slate-100 transition flex items-center gap-2 border border-slate-200">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                    รีเซ็ต
                </button>
            </div>
            <div class="flex items-center gap-2">
                <!-- Filter -->
                <select id="filterCase" onchange="applyFilter()" class="bg-white border border-slate-200 shadow-sm rounded-lg px-3 py-2 text-xs text-slate-700 outline-none focus:border-emerald-400 focus:ring-2 focus:ring-emerald-400/20">
                    <option value="all">ทุก Case</option>
                    <option value="ง่าย">ง่าย</option>
                    <option value="กลาง">กลาง</option>
                    <option value="ปานกลาง">ปานกลาง</option>
                    <option value="ยาก">ยาก</option>
                </select>
                <select id="filterResult" onchange="applyFilter()" class="bg-white border border-slate-200 shadow-sm rounded-lg px-3 py-2 text-xs text-slate-700 outline-none focus:border-emerald-400 focus:ring-2 focus:ring-emerald-400/20">
                    <option value="all">ทุกผลลัพธ์</option>
                    <option value="pass">Pass</option>
                    <option value="fail">Fail</option>
                    <option value="pending">รอรัน</option>
                </select>
            </div>
        </div>

        <!-- ═══ Progress Bar ═══ -->
        <div id="progressArea" class="hidden mb-4">
            <div class="glass rounded-xl p-4">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-xs text-slate-600" id="progressText">กำลังรัน... 0/0</span>
                    <span class="text-xs text-slate-500" id="progressEta">ETA: —</span>
                </div>
                <div class="w-full h-2 bg-slate-200 rounded-full overflow-hidden">
                    <div id="progressBar" class="h-full bg-gradient-to-r from-emerald-500 to-cyan-500 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- ═══ Results Table ═══ -->
        <div class="glass rounded-xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="border-b border-slate-200 bg-slate-50/50">
                            <th class="text-left px-4 py-3 text-[11px] font-semibold text-slate-500 uppercase tracking-wider w-12">#</th>
                            <th class="text-left px-4 py-3 text-[11px] font-semibold text-slate-500 uppercase tracking-wider">Input (คำถาม)</th>
                            <th class="text-left px-4 py-3 text-[11px] font-semibold text-slate-500 uppercase tracking-wider w-20">Case</th>
                            <th class="text-center px-4 py-3 text-[11px] font-semibold text-slate-500 uppercase tracking-wider w-24">Cosine</th>
                            <th class="text-center px-4 py-3 text-[11px] font-semibold text-slate-500 uppercase tracking-wider w-24">LLM Score</th>
                            <th class="text-center px-4 py-3 text-[11px] font-semibold text-slate-500 uppercase tracking-wider w-20">Result</th>
                            <th class="text-center px-4 py-3 text-[11px] font-semibold text-slate-500 uppercase tracking-wider w-16">Detail</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody">
                        <tr><td colspan="7" class="text-center py-12 text-slate-400 text-sm">กำลังโหลด test cases...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- ═══ Accuracy Chart (simple bar) ═══ -->
        <div id="accuracyChart" class="hidden mt-6 glass rounded-xl p-6">
            <h3 class="text-sm font-semibold text-slate-700 mb-4">📊 สรุปผลตาม Case Difficulty</h3>
            <div id="chartBars" class="space-y-3"></div>
        </div>
    </main>

    <!-- ═══ Detail Modal ═══ -->
    <div id="detailModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="absolute inset-4 sm:inset-8 md:inset-x-16 lg:inset-x-32 md:inset-y-8 bg-white rounded-2xl border border-slate-200 flex flex-col overflow-hidden shadow-2xl">
            <div class="flex items-center justify-between p-5 border-b border-slate-200">
                <h3 class="text-sm font-semibold text-slate-800" id="modalTitle">Test Case Detail</h3>
                <button onclick="closeModal()" class="p-2 rounded-lg hover:bg-slate-100 text-slate-500 hover:text-slate-800 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="flex-1 overflow-y-auto p-5 space-y-5" id="modalContent">
            </div>
        </div>
    </div>

    <script>
    // ═══════════════════════════════════════════════════════════════════════════
    // State
    // ═══════════════════════════════════════════════════════════════════════════

    let testCases = [];
    let results = {};
    let isRunning = false;
    let shouldStop = false;

    // ═══════════════════════════════════════════════════════════════════════════
    // Load Test Cases
    // ═══════════════════════════════════════════════════════════════════════════

    async function loadTestCases() {
        try {
            const res = await fetch('/api/testcases');
            testCases = await res.json();
            document.getElementById('statTotal').textContent = testCases.length;
            
            // Load saved results
            const saved = localStorage.getItem('pharmacare_test_results');
            if (saved) {
                try {
                    results = JSON.parse(saved);
                } catch(e) {
                    results = {};
                }
            }
            
            updateRunButtonText();
            renderTable();
            updateStats();
        } catch (e) {
            document.getElementById('resultsBody').innerHTML =
                `<tr><td colspan="7" class="text-center py-12 text-red-500 text-sm">❌ ไม่สามารถโหลด test cases ได้: ${e.message}</td></tr>`;
        }
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // Run Tests
    // ═══════════════════════════════════════════════════════════════════════════

    async function runAllTests() {
        if (isRunning) return;
        isRunning = true;
        shouldStop = false;

        document.getElementById('runBtn').disabled = true;
        document.getElementById('stopBtn').classList.remove('hidden');
        document.getElementById('stopBtn').classList.add('flex');
        document.getElementById('progressArea').classList.remove('hidden');

        const startTime = Date.now();
        let completed = 0;

        // Get filtered cases or all
        const casesToRun = getFilteredCases().filter(tc => !results[tc.id]);
        const total = casesToRun.length;

        if (total === 0) {
            // Re-run all if no pending cases
            resetTests(false); // reset without confirm
            const all = getFilteredCases();
            for (let i = 0; i < all.length; i++) {
                if (shouldStop) break;

                const tc = all[i];
                updateProgress(i, all.length, startTime);

                await runSingleCase(tc);
                
                if (i < all.length - 1 && !shouldStop) {
                    await delayWithProgress(15, i + 1, all.length, startTime);
                }
            }
        } else {
            for (let i = 0; i < casesToRun.length; i++) {
                if (shouldStop) break;

                const tc = casesToRun[i];
                updateProgress(i, casesToRun.length, startTime);

                await runSingleCase(tc);
                
                if (i < casesToRun.length - 1 && !shouldStop) {
                    await delayWithProgress(15, i + 1, casesToRun.length, startTime);
                }
            }
        }

        const maxTotal = Math.max(total, getFilteredCases().length);
        updateProgress(maxTotal, maxTotal, startTime);
        isRunning = false;
        document.getElementById('runBtn').disabled = false;
        document.getElementById('stopBtn').classList.add('hidden');
        document.getElementById('stopBtn').classList.remove('flex');
        updateRunButtonText();
        updateStats();
        showAccuracyChart();

        if (!shouldStop && maxTotal > 0) {
            downloadCSV();
        }
    }

    async function runSingleCase(tc) {
        try {
            const res = await fetch('/api/testcases/run-one', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(tc),
            });
            const result = await res.json();
            results[tc.id] = result;
            saveResults();
            renderTable();
            updateStats();
        } catch (e) {
            results[tc.id] = {
                ...tc,
                prediction: `Error: ${e.message}`,
                cosine: 0,
                pass: false,
            };
            saveResults();
        }
    }

    async function runSingleCaseWithUI(id) {
        if (isRunning) {
            alert('กรุณารอให้การรันทั้งหมดเสร็จสิ้นหรือกดหยุดก่อน');
            return;
        }
        const tc = testCases.find(t => t.id === id);
        if (!tc) return;
        
        delete results[id];
        renderTable();
        
        document.getElementById('progressArea').classList.remove('hidden');
        document.getElementById('progressText').textContent = `กำลังรันเคส ${id}...`;
        document.getElementById('progressBar').style.width = '100%';
        
        await runSingleCase(tc);
        
        document.getElementById('progressText').textContent = `รันเคส ${id} เสร็จสมบูรณ์`;
        setTimeout(() => {
            if (!isRunning) {
                document.getElementById('progressArea').classList.add('hidden');
            }
        }, 3000);
    }

    function saveResults() {
        localStorage.setItem('pharmacare_test_results', JSON.stringify(results));
    }

    function resetTests(confirmPrompt = true) {
        if (confirmPrompt && !confirm('คุณต้องการรีเซ็ตผลลัพธ์ทั้งหมดหรือไม่?')) return;
        results = {};
        saveResults();
        document.getElementById('progressArea').classList.add('hidden');
        document.getElementById('accuracyChart').classList.add('hidden');
        updateRunButtonText();
        renderTable();
        updateStats();
    }

    function updateRunButtonText() {
        const total = getFilteredCases().length;
        const pending = getFilteredCases().filter(tc => !results[tc.id]).length;
        const btnText = document.getElementById('runBtnText');
        if (!btnText) return;
        
        if (pending > 0 && pending < total) {
            btnText.textContent = `รันต่อ (${pending} เคสที่เหลือ)`;
        } else {
            btnText.textContent = 'รัน Test Cases ทั้งหมด';
        }
    }

    function stopTests() {
        shouldStop = true;
    }

    function updateProgress(current, total, startTime) {
        const pct = total > 0 ? (current / total * 100) : 0;
        document.getElementById('progressBar').style.width = pct + '%';
        document.getElementById('progressText').textContent = `กำลังรัน... ${current}/${total}`;

        if (current > 0) {
            const elapsed = (Date.now() - startTime) / 1000;
            const avgTime = elapsed / current;
            const remaining = (total - current) * avgTime;
            const min = Math.floor(remaining / 60);
            const sec = Math.floor(remaining % 60);
            document.getElementById('progressEta').textContent = `ETA: ${min}m ${sec}s`;
        }
    }

    async function delayWithProgress(seconds, current, total, startTime) {
        for (let s = seconds; s > 0; s--) {
            if (shouldStop) break;
            document.getElementById('progressText').textContent = `รอ ${s} วิ ป้องกัน Rate Limit... (${current}/${total})`;
            await new Promise(r => setTimeout(r, 1000));
        }
        updateProgress(current, total, startTime);
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // Render Table
    // ═══════════════════════════════════════════════════════════════════════════

    function getFilteredCases() {
        const caseFilter = document.getElementById('filterCase').value;
        const resultFilter = document.getElementById('filterResult').value;

        return testCases.filter(tc => {
            if (caseFilter !== 'all' && tc.case !== caseFilter) return false;
            if (resultFilter !== 'all') {
                const r = results[tc.id];
                if (resultFilter === 'pass' && (!r || !r.pass)) return false;
                if (resultFilter === 'fail' && (!r || r.pass)) return false;
                if (resultFilter === 'pending' && r) return false;
            }
            return true;
        });
    }

    function applyFilter() {
        renderTable();
        updateStats();
    }

    function renderTable() {
        const filtered = getFilteredCases();
        const body = document.getElementById('resultsBody');

        if (filtered.length === 0) {
            body.innerHTML = `<tr><td colspan="7" class="text-center py-12 text-slate-400 text-sm">ไม่มี test case ที่ตรงตามเงื่อนไข</td></tr>`;
            return;
        }

        body.innerHTML = filtered.map(tc => {
            const r = results[tc.id];
            const cosine = r ? r.cosine : null;
            const llmScore = r ? r.llm_score : null;
            const pass = r ? r.pass : null;
            const caseColor = tc.case === 'ง่าย' ? 'text-emerald-700 bg-emerald-50 border-emerald-200'
                            : tc.case === 'ปานกลาง' || tc.case === 'กลาง' ? 'text-amber-700 bg-amber-50 border-amber-200'
                            : tc.case === 'ยาก' ? 'text-red-700 bg-red-50 border-red-200'
                            : 'text-slate-500 bg-slate-100 border-slate-200';

            return `
                <tr class="border-b border-slate-100 row-hover transition fade-in">
                    <td class="px-4 py-3 text-xs text-slate-500 font-mono">${tc.id}</td>
                    <td class="px-4 py-3">
                        <p class="text-xs text-slate-700 leading-relaxed line-clamp-2">${escapeHtml(tc.input).substring(0, 120)}${tc.input.length > 120 ? '...' : ''}</p>
                    </td>
                    <td class="px-4 py-3">
                        <span class="inline-block px-2 py-0.5 rounded-full text-[10px] font-medium border ${caseColor}">${tc.case || '—'}</span>
                    </td>
                    <td class="px-4 py-3 text-center">
                        ${cosine !== null
                            ? `<span class="font-mono text-xs font-semibold ${cosine >= 0.79 ? 'score-high' : cosine >= 0.7 ? 'score-mid' : 'score-low'}">${cosine.toFixed(4)}</span>`
                            : `<span class="text-xs text-slate-400">—</span>`
                        }
                    </td>
                    <td class="px-4 py-3 text-center">
                        ${llmScore !== null
                            ? `<span class="font-mono text-xs font-semibold ${llmScore >= 4 ? 'score-high' : llmScore >= 3 ? 'score-mid' : 'score-low'}">${llmScore}/5</span>`
                            : `<span class="text-xs text-slate-400">—</span>`
                        }
                    </td>
                    <td class="px-4 py-3 text-center">
                        ${pass === true
                            ? `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-semibold bg-emerald-50 text-emerald-700 border border-emerald-200">✓ Pass</span>`
                            : pass === false
                            ? `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-semibold bg-red-50 text-red-700 border border-red-200">✗ Fail</span>`
                            : `<span class="text-[10px] text-slate-400">รอรัน</span>`
                        }
                    </td>
                    <td class="px-4 py-3 text-center">
                        <div class="flex items-center justify-center gap-1">
                            <button onclick="runSingleCaseWithUI('${tc.id}')" class="p-1.5 rounded-lg hover:bg-slate-100 text-slate-400 hover:text-cyan-600 transition" title="รันใหม่">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                            </button>
                            <button onclick="showDetail('${tc.id}')" class="p-1.5 rounded-lg hover:bg-slate-100 text-slate-400 hover:text-emerald-600 transition" title="ดูรายละเอียด">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                            </button>
                        </div>
                    </td>
                </tr>
            `;
        }).join('');
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // Stats
    // ═══════════════════════════════════════════════════════════════════════════

    function updateStats() {
        const filtered = getFilteredCases();
        const completed = filtered.filter(tc => results[tc.id]);
        const passed = completed.filter(tc => results[tc.id]?.pass);
        const failed = completed.filter(tc => results[tc.id] && !results[tc.id].pass);
        const cosines = completed.map(tc => results[tc.id]?.cosine || 0);
        const avgCosine = cosines.length > 0 ? cosines.reduce((a,b)=>a+b,0) / cosines.length : 0;

        document.getElementById('statTotal').textContent = filtered.length;
        document.getElementById('statPass').textContent = passed.length;
        document.getElementById('statFail').textContent = failed.length;
        document.getElementById('statAvgCosine').textContent = avgCosine > 0 ? avgCosine.toFixed(4) : '—';
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // Accuracy Chart
    // ═══════════════════════════════════════════════════════════════════════════

    function showAccuracyChart() {
        const chart = document.getElementById('accuracyChart');
        const bars = document.getElementById('chartBars');

        // Group by case type
        const groups = {};
        testCases.forEach(tc => {
            const caseType = tc.case || 'ไม่ระบุ';
            if (!groups[caseType]) groups[caseType] = { total: 0, pass: 0, cosines: [] };
            groups[caseType].total++;
            const r = results[tc.id];
            if (r) {
                if (r.pass) groups[caseType].pass++;
                groups[caseType].cosines.push(r.cosine);
            }
        });

        if (Object.keys(groups).length === 0) return;

        chart.classList.remove('hidden');

        const colors = {
            'ง่าย': 'from-emerald-500 to-emerald-400',
            'กลาง': 'from-amber-500 to-amber-400',
            'ปานกลาง': 'from-amber-500 to-amber-400',
            'ยาก': 'from-red-500 to-red-400',
        };

        bars.innerHTML = Object.entries(groups).map(([type, data]) => {
            const accuracy = data.total > 0 ? (data.pass / data.total * 100) : 0;
            const avgCos = data.cosines.length > 0 ? (data.cosines.reduce((a,b)=>a+b,0) / data.cosines.length) : 0;
            const color = colors[type] || 'from-gray-500 to-gray-400';

            return `
                <div class="fade-in">
                    <div class="flex items-center justify-between mb-1">
                        <span class="text-xs font-medium text-slate-700">${type} (${data.total} cases)</span>
                        <span class="text-xs text-slate-500">Accuracy: ${accuracy.toFixed(1)}% | Avg Cosine: ${avgCos.toFixed(4)}</span>
                    </div>
                    <div class="w-full h-3 bg-slate-200 rounded-full overflow-hidden">
                        <div class="h-full bg-gradient-to-r ${color} rounded-full transition-all duration-500" style="width: ${accuracy}%"></div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // Detail Modal
    // ═══════════════════════════════════════════════════════════════════════════

    function showDetail(id) {

        const r = results[id];

        document.getElementById('modalTitle').textContent = `Test Case #${id} — ${tc?.case || ''}`;

        const content = document.getElementById('modalContent');
        content.innerHTML = `
            <div class="space-y-4">
                <!-- Input -->
                <div>
                    <h4 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-blue-500"></span> Input (คำถาม)
                    </h4>
                    <div class="bg-slate-50 rounded-lg p-4 text-sm text-slate-700 leading-relaxed border border-slate-200 shadow-sm whitespace-pre-wrap">
                        ${escapeHtml(tc?.input || '')}
                    </div>
                </div>

                <!-- Compare Section -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Expectation -->
                    <div>
                        <h4 class="text-xs font-semibold text-emerald-600 uppercase tracking-wider mb-2 flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            Expectation (คาดหวัง)
                        </h4>
                        <div class="bg-emerald-50 rounded-lg p-4 text-sm text-emerald-800 leading-relaxed border border-emerald-100 shadow-sm h-full max-h-64 overflow-y-auto whitespace-pre-wrap msg-content">
                            ${renderMarkdown(tc?.expectation || '')}
                        </div>
                    </div>

                    ${r ? `
                    <!-- Prediction -->
                    <div>
                        <h4 class="text-xs font-semibold text-cyan-600 uppercase tracking-wider mb-2 flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                            Prediction (คำตอบ AI)
                        </h4>
                        <div class="bg-cyan-50 rounded-lg p-4 text-sm text-cyan-800 leading-relaxed border border-cyan-100 shadow-sm h-full max-h-64 overflow-y-auto whitespace-pre-wrap msg-content">

                    </div>
                    ` : `
                    <div>
                        <h4 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Prediction</h4>
                        <div class="bg-slate-100 rounded-lg p-4 text-sm text-slate-500 flex items-center justify-center h-full min-h-[100px] border border-slate-200">
                            ยังไม่ได้รัน
                        </div>
                    </div>
                    `}
                </div>

                ${r ? `
                <!-- Metrics -->
                <div class="grid grid-cols-3 gap-3">
                    <div class="bg-white rounded-lg p-3 text-center border border-slate-200 shadow-sm">
                        <p class="text-[10px] text-slate-500 uppercase mb-1">LLM Score (เต็ม 5)</p>
                        <p class="text-xl font-bold ${r.llm_score >= 4 ? 'score-high' : r.llm_score >= 3 ? 'score-mid' : 'score-low'}">${r.llm_score || '0'}/5</p>
                    </div>
                    <div class="bg-white rounded-lg p-3 text-center border border-slate-200 shadow-sm">
                        <p class="text-[10px] text-slate-500 uppercase mb-1">Cosine Similarity</p>
                        <p class="text-xl font-bold ${r.cosine >= 0.79 ? 'score-high' : r.cosine >= 0.7 ? 'score-mid' : 'score-low'}">${r.cosine?.toFixed(4) || '—'}</p>

                    <div class="bg-white rounded-lg p-3 text-center border border-slate-200 shadow-sm">
                        <p class="text-[10px] text-slate-500 uppercase mb-1">Result (Pass=LLM≥3)</p>
                        <p class="text-xl font-bold ${r.pass ? 'text-emerald-600' : 'text-red-500'}">${r.pass ? '✓ PASS' : '✗ FAIL'}</p>
                    </div>
                </div>

                <!-- LLM Reasoning -->
                <div class="bg-slate-50 rounded-lg p-4 border border-slate-200 shadow-sm">
                    <h4 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 flex items-center gap-2">
                        <svg class="w-4 h-4 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>

                            <span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full bg-emerald-50 text-emerald-700 text-[10px] border border-emerald-200">

    function closeModal() {
        document.getElementById('detailModal').classList.add('hidden');
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // Utilities
    // ═══════════════════════════════════════════════════════════════════════════

    function escapeHtml(text) {
        const d = document.createElement('div');
        d.textContent = text || '';
        return d.innerHTML;
    }

    function renderMarkdown(text) {
        if (!text) return '';
        let html = escapeHtml(text);

        // Headers ก่อน เพื่อกันชนกับ bold
        html = html.replace(/^## 🔍(.+)$/gm, '<h2 class="flex items-center gap-2 text-base font-bold text-slate-800 mt-5 mb-2 pb-1 border-b border-slate-200"><span class="text-xl">🔍</span>$1</h2>');
        html = html.replace(/^## 💊(.+)$/gm, '<h2 class="flex items-center gap-2 text-base font-bold text-emerald-700 mt-5 mb-2 pb-1 border-b border-emerald-100"><span class="text-xl">💊</span>$1</h2>');
        html = html.replace(/^## ⚠️(.+)$/gm, '<h2 class="flex items-center gap-2 text-base font-bold text-amber-700 mt-5 mb-2 pb-1 border-b border-amber-100"><span class="text-xl">⚠️</span>$1</h2>');
        html = html.replace(/^## 📚(.+)$/gm, '<h2 class="flex items-center gap-2 text-sm font-semibold text-slate-500 mt-5 mb-2"><span>📚</span>$1</h2>');
        html = html.replace(/^## (.+)$/gm, '<h2 class="text-base font-bold text-slate-800 mt-4 mb-2 pb-1 border-b border-slate-200">$1</h2>');
        html = html.replace(/^### (.+)$/gm, '<h3 class="text-sm font-semibold text-slate-700 mt-3 mb-1.5">$1</h3>');
        html = html.replace(/^# (.+)$/gm,  '<h1 class="text-lg font-bold text-slate-900 mt-4 mb-2">$1</h1>');

        // Bold และ Italic
        html = html.replace(/\*\*(.+?)\*\*/g, '<strong class="font-semibold text-slate-900">$1</strong>');
        html = html.replace(/\*(.+?)\*/g,     '<em class="italic text-slate-700">$1</em>');

        // Code
        html = html.replace(/`([^`]+)`/g, '<code class="bg-slate-100 text-emerald-700 px-1.5 py-0.5 rounded text-xs font-mono">$1</code>');

        // Blockquote
        html = html.replace(/^&gt; (.+)$/gm, '<blockquote class="border-l-3 border-emerald-400 pl-3 my-2 text-slate-600 italic text-sm">$1</blockquote>');

        // HR
        html = html.replace(/^---$/gm, '<hr class="my-4 border-slate-200">');

        // Bullet list — รวมกลุ่มก่อน
        html = html.replace(/(^- .+$\n?)+/gm, match => {
            const items = match.trim().split('\n').map(l =>
                `<li class="flex gap-2 mb-1"><span class="text-emerald-500 mt-0.5 flex-shrink-0">•</span><span>${l.replace(/^- /, '')}</span></li>`
            ).join('');
            return `<ul class="my-2 space-y-0.5">${items}</ul>`;
        });

        // Numbered list
        html = html.replace(/(^\d+\. .+$\n?)+/gm, match => {
            let idx = 1;
            const items = match.trim().split('\n').map(l =>
                `<li class="flex gap-2 mb-1"><span class="text-emerald-600 font-semibold flex-shrink-0 w-4">${idx++}.</span><span>${l.replace(/^\d+\. /, '')}</span></li>`
            ).join('');
            return `<ol class="my-2 space-y-0.5">${items}</ol>`;
        });

        // Paragraphs
        html = html.replace(/\n\n+/g, '</p><p class="mb-2 leading-relaxed">');
        html = html.replace(/\n/g, '<br>');
        html = `<p class="mb-2 leading-relaxed">${html}</p>`;
        html = html.replace(/<p[^>]*>\s*<\/p>/g, '');

        return html;
    }

    // Close modal on ESC
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeModal();
    });

    // ═══════════════════════════════════════════════════════════════════════════
    // Export CSV
    // ═══════════════════════════════════════════════════════════════════════════

    function downloadCSV() {
        if (!testCases || testCases.length === 0) return;

        const headers = ['ID', 'Input', 'Case', 'Expectation', 'Prediction', 'Cosine Similarity', 'LLM Score', 'Pass', 'LLM Reasoning'];
        const csvRows = [];
        csvRows.push(headers.join(','));

        for (const tc of testCases) {
            const r = results[tc.id];
            const prediction = r ? r.prediction : '';
            const cosine = r && r.cosine !== undefined ? r.cosine : '';
            const llmScore = r && r.llm_score !== undefined ? r.llm_score : '';
            const pass = r && r.pass !== undefined ? (r.pass ? 'PASS' : 'FAIL') : 'PENDING';
            const reasoning = r && r.llm_reasoning ? r.llm_reasoning : '';
            
            const escapeCSV = (str) => {
                if (str === null || str === undefined) return '';
                let s = String(str);
                s = s.replace(/"/g, '""');
                if (s.search(/("|,|\n)/g) >= 0) {
                    s = `"${s}"`;
                }
                return s;
            };

            const row = [
                tc.id,
                escapeCSV(tc.input),
                escapeCSV(tc.case),
                escapeCSV(tc.expectation),
                escapeCSV(prediction),
                cosine,
                llmScore,
                pass,
                escapeCSV(reasoning)
            ];
            csvRows.push(row.join(','));
        }

        const csvString = '\uFEFF' + csvRows.join('\n'); // Add BOM for Excel UTF-8 support
        const blob = new Blob([csvString], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.setAttribute('download', `test_results_${new Date().toISOString().slice(0,10)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // Init
    // ═══════════════════════════════════════════════════════════════════════════

    loadTestCases();
    </script>
